name: 更新必应壁纸 (dev)

env:
  TZ: Asia/Shanghai

on:
  schedule:
    # 每天 UTC 时间 17:10 运行（北京时间 1:10）
    - cron: "10 17 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-dev
  cancel-in-progress: false

jobs:
  update-wallpaper-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出 dev 分支
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: 启用 corepack 并激活 pnpm@latest
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 检查 pnpm 版本
        run: pnpm -v

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 获取必应壁纸
        run: pnpm start

      - name: 检查是否有更新
        id: check_changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .

          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "没有检测到 dev 分支更新"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到 dev 分支壁纸更新"
          fi

      - name: 提交更新到 dev
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git commit -m "🧪 dev 自动更新必应壁纸 $(date '+%Y-%m-%d')"
          git push origin HEAD:dev

      - name: 更新状态
        run: |
          echo "✅ dev 壁纸更新任务完成"
          echo "📅 执行时间: $(date)"
