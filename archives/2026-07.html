    *{margin:0;padding:0;box-sizing:border-box}

    .section .count{font-size:.85rem;color:#52525b;margin-bottom:32px;display:block}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
    .card.visible{opacity:1;transform:translateY(0)}
    .card img{width:100%;display:block;transition:transform .4s}
    .card:hover img{transform:scale(1.05)}
    .card .overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,10,10,.8) 0%,transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:16px;opacity:0;transition:opacity .3s}
    .card:hover .overlay{opacity:1}
    .card .overlay .card-title{font-size:.95rem;font-weight:500;color:#fafafa}
    .card .overlay .card-date{font-size:.8rem;color:#a1a1aa;margin-top:4px}

    .lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;cursor:zoom-out}
    .lightbox.active{display:flex}
    .lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:4px}
    .lightbox .lb-info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);text-align:center;color:#a1a1aa}
    .lightbox .lb-info .lb-title{font-size:1rem;color:#fafafa;margin-bottom:4px}
    .lightbox .lb-info .lb-meta{font-size:.8rem;color:#71717a}
    .lightbox .lb-close{position:absolute;top:24px;right:24px;width:40px;height:40px;background:#18181b;border:1px solid #27272a;border-radius:50%;color:#a1a1aa;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .lightbox .lb-close:hover{background:#27272a;color:#fafafa}
    .lightbox .lb-download{position:absolute;top:24px;right:80px;padding:8px 20px;background:#fafafa;color:#0a0a0a;border-radius:6px;font-size:.85rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s}
    .lightbox .lb-download:hover{background:#d4d4d8}
    .lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;background:rgba(24,24,27,.7);border:1px solid #3f3f46;border-radius:50%;color:#a1a1aa;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .lightbox .lb-nav:hover{background:#27272a;color:#fafafa}
    .lightbox .lb-prev{left:20px}
    .lightbox .lb-next{right:20px}

    @media(max-width:640px){
      .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
      .card .overlay{opacity:1;background:linear-gradient(0deg,rgba(10,10,10,.7) 0%,transparent 40%)}
      .lightbox .lb-nav{width:40px;height:40px;font-size:1.1rem}
      .lightbox .lb-prev{left:8px}
      .lightbox .lb-next{right:8px}
    }
  </style>

  <script>
    const items=[{"url":"https://www.bing.com/th?id=OHR.NavajoSandstone_ZH-CN5009673011_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"为摇滚而生","date":"2026-07-13","cr":"羚羊峡谷，纳瓦霍族保留地，亚利桑那州，美国 (© Mark Skalny/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.KatahdinWWNM_ZH-CN5496444375_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"缅因州的狂野一面","date":"2026-07-12","cr":"卡塔丁森林和水域国家纪念地，缅因州，美国 (© Cavan Images/Offset/Shutterstock)"},{"url":"https://www.bing.com/th?id=OHR.AurayBrittany_ZH-CN5549157888_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"布列塔尼的潮汐之约","date":"2026-07-11","cr":"圣古斯坦港, 欧赖, 布列塔尼, 法国 (© Rolf E. Staerk/Shutterstock)"},{"url":"https://www.bing.com/th?id=OHR.VictoriaBeach_ZH-CN8892195426_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"陆地与海洋的鸟瞰图","date":"2026-07-10","cr":"陆地与海洋的鸟瞰图，维多利亚州，澳大利亚 (© Nearmap/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.SapaVietnam_ZH-CN2178893672_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"步步传承","date":"2026-07-09","cr":"在沙巴的水稻田，老街，越南 (© Anujak Jaimook/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.LakeAtitlan_ZH-CN1920221893_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"远古火山的回响","date":"2026-07-08","cr":"阿蒂特兰湖的日出，危地马拉 (© shayes17/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.MountainToucanOrchids_ZH-CN1400221431_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"林冠华彩","date":"2026-07-07","cr":"板嘴山巨嘴鸟与兰花，厄瓜多尔 (© Murray Cooper/Minden Pictures)"},{"url":"https://www.bing.com/th?id=OHR.SyracuseItaly_ZH-CN1001695972_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"百代镌刻之城","date":"2026-07-06","cr":"锡拉库萨的日落，西西里岛，意大利 (© Balate Dorin/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.LavenderRows_ZH-CN0676810895_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"紫色花海","date":"2026-07-05","cr":"瓦朗索勒高原的薰衣草行，普罗旺斯，法国 (© Robert Harding/Shutterstock)"},{"url":"https://www.bing.com/th?id=OHR.KaysersbergVillage_ZH-CN0445080679_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"此行，不虚绕道","date":"2026-07-04","cr":"凯泽斯堡，阿尔萨斯，法国 (© Federica Gentile/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.FirefliesJapan_ZH-CN0071253415_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"流光之诗","date":"2026-07-03","cr":"小溪上方的萤火虫，冈山县，日本 (© tdub303/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.TempleEsna_ZH-CN9834689523_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"走进埃斯纳神圣的世界","date":"2026-07-02","cr":"埃斯纳神庙穹顶天花板, 埃及 (© Nick Brundle Photography/Getty Images)"},{"url":"https://www.bing.com/th?id=OHR.DungeonPark_ZH-CN9544093701_UHD.jpg&rf=LaDigue_1920x1080.jpg&pid=hp","title":"大西洋雕琢而成的加拿大","date":"2026-07-01","cr":"地牢省立公园, 纽芬兰和拉布拉多省, 加拿大 (© Kaitlyn McLachlan/Getty Images)"}];
    let currentIndex=0;

    function openLightbox(index){
      currentIndex=index;
      const w=items[index];
      document.getElementById('lb-img').src=w.url;
      document.getElementById('lb-title').textContent=w.title;
      document.getElementById('lb-meta').textContent=w.date+' · '+w.cr;
      document.getElementById('lb-download').href=w.url;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow='hidden';
    }
    function navigate(dir){
      currentIndex=(currentIndex+dir+items.length)%items.length;
      const w=items[currentIndex];
      document.getElementById('lb-img').src=w.url;
      document.getElementById('lb-title').textContent=w.title;
      document.getElementById('lb-meta').textContent=w.date+' · '+w.cr;
      document.getElementById('lb-download').href=w.url;
    }
    function closeLightbox(){
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow='';
    }
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape')closeLightbox();
      if(e.key==='ArrowLeft')navigate(-1);
      if(e.key==='ArrowRight')navigate(1);
    });

    const observer=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target)}});
    },{threshold:0.1});
    document.querySelectorAll('.card').forEach(c=>observer.observe(c));
  </script>
